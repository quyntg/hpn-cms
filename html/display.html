<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
    </head>
    <body>
        <h2>ADMIN NHẬP KẾ HOẠCH</h2>
        <input id="title" placeholder="Tiêu đề" style="width:100%">
        <div id="rows"></div>
        <button onclick="save()">Lưu</button>
        <script type="module">
            import {
                initializeApp
            } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import {
                getFirestore,
                doc,
                setDoc
            } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
            const firebaseConfig = {
                apiKey: "YOUR_KEY",
                authDomain: "YOUR_DOMAIN",
                projectId: "YOUR_ID"
            };
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const roles = ["TỔNG GIÁM ĐỐC", "PTGD TÀI CHÍNH", "PTGD KINH DOANH", "GIÁM ĐỐC KINH DOANH", "GIÁM ĐỐC QHQT", "GIÁM ĐỐC IT", "KẾ TOÁN TRƯỞNG", "GIÁM ĐỐC NHÂN SỰ", "GIÁM ĐỐC MARKETING"];
            rows.innerHTML = roles.map(r => `
  
					<div>
						<label>${r}</label>
						<br>
							<input id="${r}" style="width:100%">
							</div>
            `).join("");
            async function save() {
                const data = {
                    title: title.value,
                    rows: roles.map(r => ({
                        role: r,
                        content: document.getElementById(r).value
                    }))
                };
                await setDoc(doc(db, "plans", "current"), data);
                alert("Đã lưu");
            }
        </script>
    </body>
</html>
